<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Salto — Stock Take</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body {
    font-family:'DM Sans',sans-serif;
    background:#F7F4EF;
    color:#1A0F0A;
    min-height:100vh;
    padding-bottom:100px;
  }

  header {
    background:#fff;
    border-bottom:1px solid #E8E0D6;
    padding:.9rem 1.2rem;
    display:flex; align-items:center; gap:.8rem;
    position:sticky; top:0; z-index:100;
    box-shadow: 0 1px 8px rgba(0,0,0,.06);
  }
  .hdr-logo { width:36px; height:36px; border-radius:50%; object-fit:cover; }
  .hdr-text h1 { font-size:1rem; font-weight:600; color:#1A0F0A; }
  .hdr-text p { font-size:.72rem; color:#9A7A60; }

  main { max-width:520px; margin:0 auto; padding:1.2rem 1rem; }

  /* CONFIG NOTICE */
  .notice {
    background:#FFF8F0; border:1px solid #F0D9B5; border-radius:10px;
    padding:.8rem 1rem; margin-bottom:1.2rem;
    font-size:.8rem; color:#8B5E3C; line-height:1.5;
  }

  /* FORM META */
  .meta-row {
    display:grid; grid-template-columns:1fr 1fr; gap:.7rem; margin-bottom:1.2rem;
  }
  .field label {
    display:block; font-size:.72rem; font-weight:600; color:#9A7A60;
    text-transform:uppercase; letter-spacing:.06em; margin-bottom:.35rem;
  }
  .field input, .field select {
    width:100%; padding:.6rem .85rem;
    background:#fff; border:1.5px solid #E8E0D6; border-radius:10px;
    color:#1A0F0A; font-family:inherit; font-size:.9rem;
    transition:border-color .2s;
  }
  .field input:focus, .field select:focus {
    outline:none; border-color:#C1692A;
  }

  /* SECTION TABS */
  .tabs {
    display:flex; gap:.5rem; margin-bottom:1rem;
  }
  .tab-btn {
    flex:1; padding:.6rem; border-radius:10px;
    border:1.5px solid #E8E0D6; background:#fff;
    font-family:inherit; font-size:.85rem; font-weight:500;
    color:#9A7A60; cursor:pointer; transition:all .15s; text-align:center;
  }
  .tab-btn.active {
    background:#C1692A; border-color:#C1692A; color:#fff;
  }

  /* PROGRESS */
  .progress-wrap { height:3px; background:#E8E0D6; border-radius:3px; margin-bottom:1.2rem; }
  .progress-bar { height:100%; border-radius:3px; background:#C1692A; transition:width .3s; }

  /* SECTION HEADER */
  .section-label {
    font-size:.75rem; font-weight:600; color:#9A7A60;
    text-transform:uppercase; letter-spacing:.06em; margin-bottom:.6rem;
  }

  /* ITEM ROWS */
  .items-list {
    background:#fff; border-radius:14px; border:1.5px solid #E8E0D6;
    overflow:hidden; margin-bottom:1.2rem;
  }
  .item-row {
    display:flex; align-items:center;
    padding:.75rem 1rem; border-bottom:1px solid #F0EAE0;
    gap:.8rem;
  }
  .item-row:last-child { border-bottom:none; }
  .item-info { flex:1; }
  .item-name { font-size:.9rem; font-weight:500; color:#1A0F0A; }
  .item-unit { font-size:.72rem; color:#9A7A60; margin-top:.1rem; }

  .qty-wrap { display:flex; align-items:center; gap:.4rem; }
  .qty-btn {
    width:30px; height:30px; border-radius:50%;
    border:1.5px solid #E8E0D6; background:#F7F4EF;
    font-size:1rem; line-height:1; color:#1A0F0A;
    cursor:pointer; display:flex; align-items:center; justify-content:center;
    transition:all .15s; flex-shrink:0;
  }
  .qty-btn:active { background:#C1692A; border-color:#C1692A; color:#fff; }
  .qty-input {
    width:52px; text-align:center;
    border:1.5px solid #E8E0D6; border-radius:8px;
    padding:.3rem .2rem; font-family:inherit; font-size:.92rem;
    color:#1A0F0A; background:#fff;
    -moz-appearance:textfield;
  }
  .qty-input::-webkit-outer-spin-button,
  .qty-input::-webkit-inner-spin-button { -webkit-appearance:none; }
  .qty-input:focus { outline:none; border-color:#C1692A; }
  .qty-input.filled { border-color:#C1692A; color:#C1692A; font-weight:600; }

  /* NOTES */
  .notes-field {
    width:100%; padding:.7rem .9rem;
    background:#fff; border:1.5px solid #E8E0D6; border-radius:10px;
    font-family:inherit; font-size:.88rem; color:#1A0F0A;
    resize:vertical; min-height:75px; margin-bottom:1.2rem;
  }
  .notes-field:focus { outline:none; border-color:#C1692A; }

  /* SUBMIT */
  .submit-btn {
    position:fixed; bottom:0; left:0; right:0;
    margin:0; padding:1.1rem;
    background:#C1692A; color:#fff;
    font-family:inherit; font-size:1rem; font-weight:600;
    border:none; cursor:pointer; transition:background .2s;
    display:flex; align-items:center; justify-content:center; gap:.5rem;
  }
  .submit-btn:active { background:#a8571f; }
  .submit-btn:disabled { background:#D4C4B5; cursor:not-allowed; }

  /* SUCCESS */
  #success-screen {
    display:none; min-height:100vh;
    flex-direction:column; align-items:center; justify-content:center;
    padding:2rem; text-align:center; background:#F7F4EF;
  }
  .success-icon { font-size:3.5rem; margin-bottom:1rem; }
  .success-title { font-size:1.5rem; font-weight:600; margin-bottom:.4rem; }
  .success-sub { color:#9A7A60; font-size:.88rem; margin-bottom:2rem; line-height:1.6; }
  .again-btn {
    padding:.75rem 2rem; border-radius:10px;
    border:1.5px solid #E8E0D6; background:#fff;
    font-family:inherit; font-size:.9rem; font-weight:500;
    color:#1A0F0A; cursor:pointer;
  }

  .status-msg { text-align:center; font-size:.78rem; padding:.4rem 1rem 0; color:#9A7A60; }
  .status-msg.err { color:#EF476F; }
</style>
</head>

    <div class="hdr-text">
      <h1>Stock Take</h1>
      <p>Salto Pastawerk & Osteria</p>
    </div>
  </header>

  <main>
    <div class="notice" id="config-notice" style="display:none">
      ⚙️ <strong>Setup needed:</strong> Add your Supabase URL and key in the script to enable sync with Ground Control.
    </div>

    <!-- Meta -->
    <div class="meta-row">
      <div class="field">
        <label>Your Name</label>
        <input type="text" id="staff-name" placeholder="e.g. Marco" autocomplete="given-name">
      </div>
      <div class="field">
        <label>Period</label>
        <select id="period-select">
          <option>January</option><option>February</option><option>March</option>
          <option>April</option><option>May</option><option>June</option>
          <option>July</option><option>August</option><option>September</option>
          <option>October</option><option>November</option><option>December</option>
        </select>
      </div>
    </div>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('kitchen', this)">🍳 Kitchen</button>
      <button class="tab-btn" onclick="switchTab('bar', this)">🍷 Bar</button>
    </div>
    <div class="progress-wrap">
      <div class="progress-bar" id="progress-bar" style="width:50%"></div>
    </div>

    <!-- Kitchen -->
    <div id="tab-kitchen">
      <div class="section-label">Kitchen — closing quantities</div>
      <div class="items-list" id="kitchen-items"></div>
    </div>

    <!-- Bar -->
    <div id="tab-bar" style="display:none">
      <div class="section-label">Bar — closing quantities</div>
      <div class="items-list" id="bar-items"></div>
    </div>

    <!-- Notes -->
    <div class="field">
      <label>Notes / Issues</label>
      <textarea class="notes-field" id="notes" placeholder="Damaged items, low stock alerts, supplier issues..."></textarea>
    </div>
  </main>

  <button class="submit-btn" id="submit-btn" onclick="submitStock()">
    Submit Stock Take →
  </button>
  <div class="status-msg" id="status-msg"></div>
</div>

<!-- SUCCESS -->
<div id="success-screen">
  <div class="success-icon">✅</div>
  <div class="success-title">Submitted!</div>
  <div class="success-sub" id="success-detail">
    Stock take sent to Ground Control.
  </div>
  <button class="again-btn" onclick="resetForm()">Do another period</button>
</div>

<script>
// ════════════════════════════════════
// ⚙️ CONFIG — fill in after Supabase setup
// ════════════════════════════════════
const SUPABASE_URL = 'https://phoocxomnrtnvuymekpa.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InBob29jeG9tbnJ0bnZ1eW1la3BhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3Mzk5MTIsImV4cCI6MjA4ODMxNTkxMn0.r8d2J3EFXAcKzipwBGJt26GiWKf99uFmMNrvCHYm5Ug';

// ════════════════════════════════════
// STOCK ITEMS
// ════════════════════════════════════
const kitchenItems = [
  { name:'Beef Sirloin',     unit:'kg' },
  { name:'Chicken Breast',   unit:'kg' },
  { name:'Salmon Fillet',    unit:'kg' },
  { name:'Pasta Dried',      unit:'kg' },
  { name:'Cream',            unit:'L'  },
  { name:'Butter',           unit:'kg' },
  { name:'Eggs',             unit:'doz'},
  { name:'Olive Oil',        unit:'L'  },
  { name:'Mixed Salad',      unit:'kg' },
  { name:'Coffee Beans',     unit:'kg' },
  { name:'Flour',            unit:'kg' },
  { name:'Tomatoes',         unit:'kg' },
];

const barItems = [
  { name:'Red Wine',         unit:'bottles' },
  { name:'White Wine',       unit:'bottles' },
  { name:'Sparkling Wine',   unit:'bottles' },
  { name:'Beer - Craft',     unit:'cases'   },
  { name:'Beer - Lager',     unit:'cases'   },
  { name:'Spirits - Gin',    unit:'bottles' },
  { name:'Spirits - Vodka',  unit:'bottles' },
  { name:'Spirits - Whiskey',unit:'bottles' },
  { name:'Soft Drinks',      unit:'cases'   },
  { name:'Juices',           unit:'L'       },
  { name:'Syrups & Mixers',  unit:'bottles' },
  { name:'Tonic Water',      unit:'cases'   },
];

function buildList(items, containerId) {
  const container = document.getElementById(containerId);
  items.forEach((item, i) => {
    const id = `${containerId}-${i}`;
    const div = document.createElement('div');
    div.className = 'item-row';
    div.innerHTML = `
      <div class="item-info">
        <div class="item-name">${item.name}</div>
        <div class="item-unit">${item.unit}</div>
      </div>
      <div class="qty-wrap">
        <button class="qty-btn" onclick="adj('${id}',-1)">−</button>
        <input class="qty-input" id="${id}" type="number" min="0" step="0.5" placeholder="0"
          oninput="this.classList.toggle('filled', this.value!=='' && parseFloat(this.value)>0)">
        <button class="qty-btn" onclick="adj('${id}',1)">+</button>
      </div>`;
    container.appendChild(div);
  });
}

function adj(id, d) {
  const el = document.getElementById(id);
  const v = Math.max(0, (parseFloat(el.value)||0) + d);
  el.value = v % 1 === 0 ? v : v.toFixed(1);
  el.classList.toggle('filled', v > 0);
}

// ════════════════════════════════════
// TABS
// ════════════════════════════════════
function switchTab(tab, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-kitchen').style.display = tab === 'kitchen' ? 'block' : 'none';
  document.getElementById('tab-bar').style.display     = tab === 'bar'     ? 'block' : 'none';
  document.getElementById('progress-bar').style.width  = tab === 'kitchen' ? '50%'   : '100%';
}

// ════════════════════════════════════
// SUBMIT
// ════════════════════════════════════
async function submitStock() {
  const name   = document.getElementById('staff-name').value.trim() || 'Staff';
  const period = document.getElementById('period-select').value;
  const notes  = document.getElementById('notes').value.trim();
  const btn    = document.getElementById('submit-btn');
  const msg    = document.getElementById('status-msg');

  const kitchen = {};
  kitchenItems.forEach((item, i) => {
    kitchen[item.name] = parseFloat(document.getElementById(`kitchen-items-${i}`)?.value) || 0;
  });
  const bar = {};
  barItems.forEach((item, i) => {
    bar[item.name] = parseFloat(document.getElementById(`bar-items-${i}`)?.value) || 0;
  });

  const payload = {
    period,
    staff_name: name,
    submitted_at: new Date().toISOString(),
    kitchen,
    bar,
    notes
  };

  btn.disabled = true;
  btn.textContent = 'Submitting…';
  msg.textContent = '';
  msg.className = 'status-msg';

  if (SUPABASE_URL !== 'YOUR_SUPABASE_URL') {
    try {
      const res = await fetch(SUPABASE_URL + '/rest/v1/stock_takes', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'apikey': SUPABASE_ANON_KEY,
          'Authorization': 'Bearer ' + SUPABASE_ANON_KEY,
          'Prefer': 'return=minimal'
        },
        body: JSON.stringify(payload)
      });
      if (!res.ok) throw new Error('Error ' + res.status);
      showSuccess(name, period);
    } catch(e) {
      btn.disabled = false;
      btn.textContent = 'Submit Stock Take →';
      msg.textContent = '⚠️ ' + e.message + '. Check your connection.';
      msg.className = 'status-msg err';
    }
  } else {
    // Demo mode
    console.log('Payload:', payload);
    setTimeout(() => showSuccess(name, period), 600);
  }
}

function showSuccess(name, period) {
  document.getElementById('app-screen').style.display = 'none';
  document.getElementById('success-screen').style.display = 'flex';
  document.getElementById('success-detail').innerHTML =
    `<strong>${name}</strong>'s stock take for <strong>${period}</strong><br>has been sent to Ground Control.`;
}

function resetForm() {
  document.getElementById('success-screen').style.display = 'none';
  document.getElementById('app-screen').style.display = 'block';
  document.getElementById('submit-btn').disabled = false;
  document.getElementById('submit-btn').textContent = 'Submit Stock Take →';
  document.getElementById('notes').value = '';
  document.getElementById('staff-name').value = '';
  document.querySelectorAll('.qty-input').forEach(el => { el.value=''; el.classList.remove('filled'); });
  switchTab('kitchen', document.querySelector('.tab-btn'));
}

// ════════════════════════════════════
// INIT
// ════════════════════════════════════
buildList(kitchenItems, 'kitchen-items');
buildList(barItems, 'bar-items');

// Set current month
const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
document.getElementById('period-select').value = months[new Date().getMonth()];

if (false) {
  document.getElementById('config-notice').style.display = 'block';
}
</script>
</body>
</html>
